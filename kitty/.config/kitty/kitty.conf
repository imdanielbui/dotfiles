# ╭─────────────────────────────────────────╮
# │  kitty.conf — modern sleek / borderless  │
# ╰─────────────────────────────────────────╯

# ── Theme ─────────────────────────────────
include current-theme.conf
term xterm-kitty

# ── Font ──────────────────────────────────
font_family      CaskaydiaCove Nerd Font Mono
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        14.0

# Ligatures (đẹp hơn khi code)
font_features    CaskaydiaCoveNFM-Regular +calt +liga
macos_option_as_alt left
shell_integration enabled

# ── Window ────────────────────────────────
initial_window_width  1200
initial_window_height 800
window_padding_width  10

# Borderless, no titlebar
hide_window_decorations yes
background_opacity      1.0

# Căn cursor đẹp hơn
cursor_shape           block
cursor_blink_interval  0

# ── Tab bar — ẨN hoàn toàn ───────────────
tab_bar_style hidden

# ── Scrollback ────────────────────────────
scrollback_lines 10000
scrollback_pager bat --style=plain

# ── URL ───────────────────────────────────
url_style            curly
open_url_with        default
detect_urls          yes

# ── Performance ───────────────────────────
repaint_delay  10
input_delay    3
sync_to_monitor yes

# ── Bell ──────────────────────────────────
enable_audio_bell no
visual_bell_duration 0.0

# ── Clipboard ─────────────────────────────
clipboard_control write-primary write-clipboard read-primary read-clipboard

# ── Keyboard mappings ─────────────────────
# Tab management
map ctrl+shift+t new_tab
map ctrl+shift+w close_tab
map ctrl+shift+up   previous_tab
map ctrl+shift+down next_tab

# Window splitting (tmux-style trong kitty)
map ctrl+shift+enter new_window
map ctrl+shift+] next_window
map ctrl+shift+[ previous_window

# Clipboard
map ctrl+shift+c copy_to_clipboard
map ctrl+shift+v paste_from_clipboard

# Font size on the fly
map ctrl+equal  change_font_size all +1.0
map ctrl+minus  change_font_size all -1.0
map ctrl+0      change_font_size all 0

# Reload config không cần restart
map ctrl+shift+F5 load_config_file
