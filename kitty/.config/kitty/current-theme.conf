# Catppuccin Mocha for Kitty

# Background
background #1e1e2e

# Foreground
foreground #cdd6f4

# Selection Background
selection_background #45475a

# Selection Foreground
selection_foreground #cdd6f4

# Cursor
cursor #f5e0dc

# Cursor Text
cursor_text_color #1e1e2e

# Terminal Black
color0 #45475a
color1 #f38ba8
color2 #a6e3a1
color3 #f9e2af
color4 #89b4fa
color5 #f5c2e7
color6 #94e2d5
color7 #bac2de
color8 #585b70
color9 #f38ba8
color10 #a6e3a1
color11 #f9e2af
color12 #89b4fa
color13 #f5c2e7
color14 #94e2d5
color15 #a6adc8

# Dimmed (for sidebar etc)
color16 #fab387
color17 #eba0ac

# Scrollbar
scrollbar_margin 0 0
scrollbar_color #45475a

# Tab Bar
tab_bar_background #1e1e2e
tab_bar_margin_color #1e1e2e
tab_bar_active_tab_background #1e1e2e
tab_bar_active_tab_foreground #f5e0dc
tab_bar_inactive_tab_background #313244
tab_bar_inactive_tab_foreground #6c7086

# Title Bar
window_logo_path /Users/mac/.config/kitty/icons/kitty.png
window_logo_alpha 0.2