# ===== TERMINAL (macOS + Kitty) =====
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -ag terminal-overrides ",*:U8=0"        # fix undercurl kitty
set -as terminal-features ",xterm-kitty:RGB,ccolour,cstyle,extkeys,focus,title,hyperlinks"
set -as terminal-features ",tmux-256color:RGB"

# ===== PREFIX =====
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ===== GENERAL =====
set -g mouse on
set -g history-limit 50000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -sg escape-time 0                       # fix nvim ESC lag
set -g focus-events on                      # nvim autoread
set -g allow-passthrough on                 # kitty/OSC52 passthrough
set -g set-clipboard on
set-option -g status-position top
set -g status-keys vi
setw -g xterm-keys on

# ===== SPLIT (giữ cwd) =====
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"
bind l split-window -h -c "#{pane_current_path}" \; select-pane -R
bind r source-file ~/.tmux.conf \; display-message "tmux reloaded"

# ===== VIM-TMUX-NAVIGATOR =====
# Ctrl+h/j/k/l always move between tmux panes.
bind -n C-h select-pane -L
bind -n C-j select-pane -D
bind -n C-k select-pane -U
bind -n C-l select-pane -R
bind -n C-\\ select-pane -l

bind -T copy-mode-vi C-h select-pane -L
bind -T copy-mode-vi C-j select-pane -D
bind -T copy-mode-vi C-k select-pane -U
bind -T copy-mode-vi C-l select-pane -R

# ===== PANE NAVIGATION (prefix + hjkl) =====
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind -r Right select-pane -R

# Resize
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ===== WINDOW =====
bind , previous-window
bind . next-window
bind x kill-pane
bind q kill-window
bind < swap-window -t -1\; select-window -t -1
bind > swap-window -t +1\; select-window -t +1

# ===== COPY MODE (vi style) =====
setw -g mode-keys vi
bind [ copy-mode
bind ] paste-buffer
bind -T copy-mode-vi v      send-keys -X begin-selection
bind -T copy-mode-vi y      send-keys -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi Escape send-keys -X cancel
bind -T copy-mode-vi C-v    send-keys -X rectangle-toggle

# ===== TPM PLUGINS =====
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'catppuccin/tmux#v2.1.0'

# Catppuccin
set -g @catppuccin_flavor "mocha"
set -g @catppuccin_window_status_style "rounded"

# Status bar
set -g status-left ""
set -g status-right "#{E:@catppuccin_status_application} #{E:@catppuccin_status_session}"
set -g status-style bg=default

# ===== KHỞI TẠO TPM (luôn cuối file) =====
run '~/.tmux/plugins/tpm/tpm'

# ===== OVERRIDE KEYS AFTER PLUGINS =====
bind -n C-h select-pane -L
bind -n C-j select-pane -D
bind -n C-k select-pane -U
bind -n C-l select-pane -R
bind -n C-\\ select-pane -l
